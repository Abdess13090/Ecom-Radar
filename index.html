<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ECOM WINNERS RADAR</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-950 text-gray-100 font-sans min-h-screen">
    <div class="max-w-7xl mx-auto px-4 py-8">
        <!-- Header -->
        <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-8 border-b border-gray-800 pb-6">
            <div>
                <h1 class="text-3xl font-black tracking-tight text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-blue-500">ECOM WINNERS RADAR</h1>
                <p class="text-gray-400 mt-1 text-sm">Mis à jour automatiquement tous les matins à 06:00 UTC</p>
            </div>
            <div class="mt-4 md:mt-0 bg-gray-900 border border-gray-800 px-4 py-2 rounded-lg text-sm text-cyan-400 font-mono">
                Dernier Sync: <span id="sync-time">Chargement...</span>
            </div>
        </div>

        <!-- KPIs -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
            <div class="bg-gray-900 border border-gray-800 p-6 rounded-xl">
                <p class="text-xs font-semibold text-gray-400 uppercase tracking-wider">Produits Détectés Ce Matin</p>
                <p id="kpi-count" class="text-3xl font-bold text-white mt-2">-</p>
            </div>
            <div class="bg-gray-900 border border-gray-800 p-6 rounded-xl">
                <p class="text-xs font-semibold text-gray-400 uppercase tracking-wider">Marge Bénéficiaire Moyenne</p>
                <p id="kpi-margin" class="text-3xl font-bold text-green-400 mt-2">-</p>
            </div>
            <div class="bg-gray-900 border border-gray-800 p-6 rounded-xl">
                <p class="text-xs font-semibold text-gray-400 uppercase tracking-wider">Canal Dominant 2026</p>
                <p id="kpi-source" class="text-3xl font-bold text-cyan-400 mt-2">-</p>
            </div>
        </div>

        <!-- Product Grid -->
        <h2 class="text-xl font-bold mb-4 flex items-center gap-2">🔥 Opportunités Prioritaires</h2>
        <div id="products-container" class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <!-- Injecté par JavaScript -->
        </div>
    </div>

    <script>
        // Va chercher les données en temps réel sur ton API Vercel
        fetch('/api/trends')
            .then(res => res.json())
            .then(data => {
                document.getElementById('sync-time').innerText = data.last_update;
                document.getElementById('kpi-count').innerText = data.metrics.scouted_today + " Produits";
                document.getElementById('kpi-margin').innerText = data.metrics.avg_margin;
                document.getElementById('kpi-source').innerText = data.metrics.top_source;

                const container = document.getElementById('products-container');
                container.innerHTML = '';

                data.products.forEach(p => {
                    container.innerHTML += `
                        <div class="bg-gray-900 border border-gray-800 p-6 rounded-xl relative overflow-hidden hover:border-gray-700 transition">
                            <div class="flex justify-between items-start mb-4">
                                <div>
                                    <span class="px-2 py-1 text-xs font-bold rounded bg-gray-800 text-cyan-400 uppercase">${p.source}</span>
                                    <span class="ml-2 text-xs text-gray-400">${p.niche}</span>
                                    <h3 class="text-xl font-bold text-white mt-2">${p.name}</h3>
                                </div>
                                <div class="text-right">
                                    <span class="text-emerald-400 font-bold text-lg">${p.growth}</span>
                                    <p class="text-xs text-gray-400">Vélocité</p>
                                </div>
                            </div>
                            <div class="grid grid-cols-3 gap-2 bg-gray-950 p-3 rounded-lg text-center my-4 text-sm">
                                <div><p class="text-gray-500 text-xs">Coût Achat</p><p class="font-bold text-white">${p.cost}</p></div>
                                <div><p class="text-gray-500 text-xs">Prix Vente</p><p class="font-bold text-white">${p.price}</p></div>
                                <div><p class="text-gray-500 text-xs">Marge Net</p><p class="font-bold text-green-400">${p.margin}</p></div>
                            </div>
                            <div class="mt-2">
                                <p class="text-xs text-gray-400 font-semibold uppercase">Stratégie Marketing Recommandée :</p>
                                <p class="text-sm text-gray-300 mt-1">${p.strategy}</p>
                            </div>
                            <div class="mt-4 flex items-center justify-between border-t border-gray-800 pt-3 text-xs">
                                <span class="text-gray-500">Score de Viralité :</span>
                                <div class="w-2/3 bg-gray-800 rounded-full h-2 ml-2 relative">
                                    <div class="bg-gradient-to-r from-cyan-500 to-blue-500 h-2 rounded-full" style="width: ${p.virality}%"></div>
                                </div>
                                <span class="ml-2 font-bold text-cyan-400">${p.virality}/100</span>
                            </div>
                        </div>
                    `;
                });
            });
    </script>
</body>
</html>
