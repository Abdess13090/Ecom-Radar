<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TRENDTRACKER PRO — Ecom Radar</title>
    <!-- Chargement de Tailwind CSS et des icônes Google Font -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen selection:bg-cyan-500 selection:text-slate-950">

    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-10">
        
        <!-- HEADER EN FLUIDE -->
        <header class="flex flex-col md:flex-row justify-between items-start md:items-center mb-12 border-b border-slate-800/60 pb-8 gap-4">
            <div>
                <div class="flex items-center gap-2">
                    <span class="w-2.5 h-2.5 rounded-full bg-cyan-500 animate-pulse"></span>
                    <h1 class="text-3xl font-extrabold tracking-tight bg-gradient-to-r from-white via-slate-200 to-slate-400 bg-clip-text text-transparent">
                        TRENDTRACKER <span class="text-cyan-400 font-medium">PRO</span>
                    </h1>
                </div>
                <p class="text-slate-400 mt-2 text-sm font-medium">Algorithme de tracking de volumes et vélocité e-commerce</p>
            </div>
            
            <div class="flex flex-col sm:flex-row items-start sm:items-center gap-3">
                <div class="bg-slate-900/80 backdrop-blur border border-slate-800 px-4 py-2.5 rounded-xl text-xs text-slate-400 font-medium shadow-xl">
                    🔄 Prochaine synchro : <span class="text-slate-200 font-semibold">Demain, 06:00 UTC</span>
                </div>
                <div class="bg-cyan-950/40 border border-cyan-800/50 px-4 py-2.5 rounded-xl text-xs text-cyan-400 font-mono shadow-lg shadow-cyan-950/20">
                    Dernier Scan: <span id="sync-time" class="font-bold">Chargement...</span>
                </div>
            </div>
        </header>

        <!-- DASHBOARD METRICS (LES FILTRES & KPI COUPLÉS) -->
        <section class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-12">
            <div class="bg-slate-900/40 backdrop-blur border border-slate-800/80 p-6 rounded-2xl shadow-xl hover:border-slate-700/50 transition duration-300">
                <div class="text-xs font-bold text-slate-400 uppercase tracking-widest mb-1">Signaux Détectés</div>
                <div class="flex items-baseline gap-2">
                    <span id="kpi-count" class="text-4xl font-black text-white">-</span>
                    <span class="text-xs font-semibold text-cyan-400 bg-cyan-950/50 px-2 py-0.5 rounded-full">Breakout</span>
                </div>
            </div>
            
            <div class="bg-slate-900/40 backdrop-blur border border-slate-800/80 p-6 rounded-2xl shadow-xl hover:border-slate-700/50 transition duration-300">
                <div class="text-xs font-bold text-slate-400 uppercase tracking-widest mb-1">Marge Brute Moyenne</div>
                <div class="flex items-baseline gap-2">
                    <span id="kpi-margin" class="text-4xl font-black text-emerald-400">-</span>
                    <span class="text-xs font-semibold text-emerald-400 bg-emerald-950/50 px-2 py-0.5 rounded-full">Potentiel Top</span>
                </div>
            </div>

            <div class="bg-slate-900/40 backdrop-blur border border-slate-800/80 p-6 rounded-2xl shadow-xl hover:border-slate-700/50 transition duration-300">
                <div class="text-xs font-bold text-slate-400 uppercase tracking-widest mb-1">Moteur Source Dominant</div>
                <div id="kpi-source" class="text-xl font-bold text-slate-200 mt-3 truncate">-</div>
            </div>
        </section>

        <!-- GRILLE DES PRODUITS GAGNANTS -->
        <main>
            <div class="flex items-center justify-between mb-6">
                <h2 class="text-lg font-bold tracking-tight text-slate-300 flex items-center gap-2">
                    ⚡ Flux de Produits Qualifiés
                </h2>
                <span class="text-xs text-slate-500 font-medium">Trié par indice d'accélération</span>
            </div>
            
            <div id="products-container" class="grid grid-cols-1 lg:grid-cols-2 gap-8">
                <!-- Les cartes produits seront injectées ici dynamiquement -->
            </div>
        </main>
        
    </div>

    <!-- SCRIPT DE RECUPERATION ET LOGIQUE DE COULEUR DES BADGES -->
    <script>
        fetch('/api/trends')
            .then(res => res.json())
            .then(data => {
                document.getElementById('sync-time').innerText = data.last_update;
                document.getElementById('kpi-count').innerText = data.metrics.scouted_today;
                document.getElementById('kpi-margin').innerText = data.metrics.avg_margin;
                document.getElementById('kpi-source').innerText = data.metrics.top_source;

                const container = document.getElementById('products-container');
                container.innerHTML = '';

                data.products.forEach(p => {
                    // Gestion de la couleur du badge selon le canal d'acquisition
                    let badgeColor = "bg-slate-800 text-slate-300 border-slate-700";
                    if(p.source.includes("TikTok")) badgeColor = "bg-pink-950/40 text-pink-400 border-pink-900/50";
                    if(p.source.includes("Amazon")) badgeColor = "bg-amber-950/40 text-amber-400 border-amber-900/50";
                    if(p.source.includes("Google")) badgeColor = "bg-blue-950/40 text-blue-400 border-blue-900/50";
                    if(p.source.includes("Pinterest")) badgeColor = "bg-red-950/40 text-red-400 border-red-900/50";

                    container.innerHTML += `
                        <div class="bg-slate-900/20 backdrop-blur-md border border-slate-800/80 rounded-2xl p-6 relative flex flex-col justify-between shadow-2xl hover:border-slate-700/60 transition duration-300 group">
                            
                            <!-- Top Card -->
                            <div>
                                <div class="flex justify-between items-start gap-4 mb-4">
                                    <div class="truncate">
                                        <div class="flex items-center gap-2 flex-wrap">
                                            <span class="px-2.5 py-0.5 text-[10px] font-bold tracking-wider rounded-md border uppercase ${badgeColor}">${p.source}</span>
                                            <span class="text-xs font-medium text-slate-500">${p.niche}</span>
                                        </div>
                                        <h3 class="text-xl font-bold text-white mt-2.5 tracking-tight group-hover:text-cyan-400 transition-colors duration-200">${p.name}</h3>
                                    </div>
                                    <div class="text-right shrink-0 bg-emerald-950/30 border border-emerald-900/50 px-3 py-1.5 rounded-xl">
                                        <span class="text-emerald-400 font-extrabold text-base block">${p.growth}</span>
                                        <p class="text-[10px] uppercase font-bold tracking-wider text-slate-400">Vélocité</p>
                                    </div>
                                </div>

                                <!-- Box Financière -->
                                <div class="grid grid-cols-3 gap-1 bg-slate-950/60 border border-slate-900 p-3.5 rounded-xl text-center my-5 shadow-inner">
                                    <div>
                                        <p class="text-slate-500 text-[10px] uppercase font-bold tracking-wider">Achat COGS</p>
                                        <p class="font-bold text-slate-200 mt-0.5">${p.cost}</p>
                                    </div>
                                    <div>
                                        <p class="text-slate-500 text-[10px] uppercase font-bold tracking-wider">Prix de vente</p>
                                        <p class="font-bold text-slate-200 mt-0.5">${p.price}</p>
                                    </div>
                                    <div>
                                        <p class="text-slate-500 text-[10px] uppercase font-bold tracking-wider">Marge Net</p>
                                        <p class="font-black text-emerald-400 mt-0.5">${p.margin}</p>
                                    </div>
                                </div>

                                <!-- Description de l'angle marketing -->
                                <div class="space-y-1 mb-6">
                                    <h4 class="text-[10px] text-slate-400 font-bold uppercase tracking-wider">Angle & Stratégie Ads :</h4>
                                    <p class="text-sm text-slate-300 leading-relaxed font-medium">${p.strategy}</p>
                                </div>
                            </div>

                            <!-- Footer de carte : Barre de force / Vitalité -->
                            <div class="border-t border-slate-800/80 pt-4 flex items-center justify-between gap-4 text-xs font-medium">
                                <span class="text-slate-500 text-[11px]">Score de Virauté :</span>
                                <div class="flex-1 bg-slate-950 rounded-full h-2 relative overflow-hidden border border-slate-900">
                                    <div class="bg-gradient-to-r from-cyan-500 to-indigo-500 h-2 rounded-full transition-all duration-500" style="width: ${p.virality}%"></div>
                                </div>
                                <span class="font-bold text-cyan-400 font-mono text-[11px] bg-cyan-950/40 px-2 py-0.5 rounded">${p.virality}/100</span>
                            </div>

                        </div>
                    `;
                });
            }).catch(err => console.error("Erreur de chargement de l'API :", err));
    </script>
</body>
</html>
